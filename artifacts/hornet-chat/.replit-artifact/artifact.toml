kind = "web"
previewPath = "/"
title = "NudYed"
version = "1.0.0"
id = "artifacts/hornet-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23594

[services.development]
run = "pnpm --filter @workspace/hornet-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hornet-chat", "run", "build" ]
publicDir = "artifacts/hornet-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23594"
BASE_PATH = "/"
